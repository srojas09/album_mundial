<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Álbum Mundial 2026{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>

{% if user %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/home">
            <i class="bi bi-trophy-fill text-warning"></i> Álbum Mundial 2026
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/home"><i class="bi bi-house"></i> Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/album"><i class="bi bi-book"></i> Mi Álbum</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/repetidas"><i class="bi bi-arrow-repeat"></i> Repetidas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/marketplace"><i class="bi bi-shop"></i> Marketplace</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/stats"><i class="bi bi-bar-chart"></i> Estadísticas</a>
                </li>
            </ul>
            <form class="d-flex me-3" action="/buscar" method="get">
                <input class="form-control me-2" type="search" name="q" placeholder="Buscar jugador...">
                <button class="btn btn-warning" type="submit"><i class="bi bi-search"></i></button>
            </form>
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i> {{ user.nombre }}
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/logout"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
{% endif %}

<main class="container my-4">
    {% block content %}{% endblock %}
</main>

<footer class="bg-dark text-white text-center py-3 mt-5">
    <small>🌍 Álbum Mundial 2026 — Ingeniería Web</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
