{% extends "base.html" %}

{% block title %}Crear Cuenta — Álbum Mundial 2026{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill text-warning" style="font-size: 3rem;"></i>
                    <h2 class="fw-bold mt-2">Crear Cuenta</h2>
                    <p class="text-muted">Únete y gestiona tu álbum del Mundial</p>
                </div>

                {% if error %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle"></i> {{ error }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endif %}

                <form method="post" action="/register">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre completo</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="nombre" class="form-control"
                                   placeholder="Tu nombre" required minlength="2">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" class="form-control"
                                   placeholder="tu@email.com" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control"
                                   placeholder="Mínimo 6 caracteres" required minlength="6">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Confirmar contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" name="confirmar_password" class="form-control"
                                   placeholder="Repite tu contraseña" required minlength="6">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2">
                        <i class="bi bi-person-check"></i> Crear Cuenta
                    </button>
                </form>

                <hr class="my-4">
                <p class="text-center text-muted mb-0">
                    ¿Ya tienes cuenta?
                    <a href="/login" class="text-warning fw-semibold">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
